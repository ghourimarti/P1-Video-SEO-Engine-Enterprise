name: Nightly RAGAS Eval

on:
  schedule:
    - cron: "0 2 * * *"    # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      sample:
        description: "Number of golden-set samples to evaluate"
        required: false
        default: "100"

env:
  UV_VERSION: "0.4.18"

jobs:
  ragas-eval:
    name: Full RAGAS Evaluation
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: anime_rag_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anime_rag_test
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLERK_JWKS_URL: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install deps
        run: |
          cd apps/api && uv sync --extra dev
          cd ../../packages/eval && uv sync

      - name: Run migrations + seed data
        working-directory: apps/api
        run: |
          uv run alembic upgrade head
          uv run python ../../scripts/ingest.py --csv ../../data/anime_with_synopsis.csv

      - name: Start API
        working-directory: apps/api
        run: |
          uv run uvicorn anime_rag.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Run RAGAS eval (full golden set)
        id: eval
        working-directory: packages/eval
        run: |
          SAMPLE=${{ github.event.inputs.sample || '100' }}
          uv run python -m eval.ragas_runner \
            --api-url http://localhost:8000 \
            --sample "$SAMPLE" \
            --report /tmp/ragas-nightly.json

          # Extract scores for summary
          python3 - <<'EOF'
          import json, sys
          data = json.load(open("/tmp/ragas-nightly.json"))
          scores = data.get("scores", {})
          print("### RAGAS Nightly Results")
          for k, v in scores.items():
              status = "✅" if v >= 0.75 else "❌"
              print(f"{status} {k}: {v:.4f}")
          failed = [k for k, v in scores.items() if v < 0.75]
          if failed:
              print(f"\nFAILED metrics: {', '.join(failed)}")
              sys.exit(1)
          EOF

      - name: Upload eval report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ragas-nightly-${{ github.run_id }}
          path: /tmp/ragas-nightly.json
          retention-days: 30

      - name: Post results to GitHub summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os
          data = json.load(open("/tmp/ragas-nightly.json"))
          scores = data.get("scores", {})
          lines = ["## Nightly RAGAS Evaluation\n", "| Metric | Score | Pass |",
                   "|--------|-------|------|"]
          for k, v in scores.items():
              icon = "✅" if v >= 0.75 else "❌"
              lines.append(f"| {k} | {v:.4f} | {icon} |")
          lines.append(f"\n_Samples evaluated: {data.get('n_samples', '?')}_")
          lines.append(f"_Run: {os.environ.get('GITHUB_RUN_ID')}_")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines))
          EOF

      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let scores = {};
            try {
              const data = JSON.parse(fs.readFileSync('/tmp/ragas-nightly.json', 'utf8'));
              scores = data.scores || {};
            } catch (_) {}
            const failed = Object.entries(scores)
              .filter(([, v]) => v < 0.75)
              .map(([k, v]) => `- **${k}**: ${v.toFixed(4)} (threshold 0.75)`)
              .join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Nightly RAGAS eval failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## RAGAS Quality Gate Failed\n\n${failed || 'See workflow logs for details.'}\n\n` +
                    `[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['eval-failure', 'automated'],
            });
