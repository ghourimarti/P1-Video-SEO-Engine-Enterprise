name: CD

on:
  push:
    branches: [main]

# Prevent concurrent deploys to the same env
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  API_REPO: anime-rag/api
  WEB_REPO: anime-rag/web

jobs:
  # ── 1. Build + push API image ───────────────────────────────────────────────
  build-api:
    name: Build & Push API
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image meta
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.API_REPO }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  # ── 2. Build + push Web image ───────────────────────────────────────────────
  build-web:
    name: Build & Push Web
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image meta
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.WEB_REPO }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  # ── 3. Deploy to dev ────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-24.04
    needs: [build-api, build-web]
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name anime-rag-dev --region ${{ env.AWS_REGION }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: ArgoCD login
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web

      - name: Sync dev-api
        run: |
          argocd app set dev-api \
            --helm-set image.repository=${{ needs.build-api.outputs.image }} \
            --helm-set image.tag=${{ needs.build-api.outputs.tag }}
          argocd app sync dev-api --timeout 300

      - name: Sync dev-web
        run: |
          argocd app set dev-web \
            --helm-set image.repository=${{ needs.build-web.outputs.image }} \
            --helm-set image.tag=${{ needs.build-web.outputs.tag }}
          argocd app sync dev-web --timeout 300

      - name: Smoke test dev
        run: |
          DEV_URL=${{ secrets.DEV_API_URL }}
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${DEV_URL}/health" || echo 000)
            [ "$STATUS" = "200" ] && echo "Dev healthy" && exit 0
            echo "Attempt $i: status $STATUS — retrying in 15s"
            sleep 15
          done
          echo "Dev smoke test failed" && exit 1

  # ── 4. Deploy to prod (manual approval gate) ───────────────────────────────
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-24.04
    needs: [build-api, build-web, deploy-dev]
    environment: prod          # GitHub environment protection rules apply here
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name anime-rag-prod --region ${{ env.AWS_REGION }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: ArgoCD login
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web

      - name: Sync prod-api (triggers Argo Rollouts canary)
        run: |
          argocd app set prod-api \
            --helm-set image.repository=${{ needs.build-api.outputs.image }} \
            --helm-set image.tag=${{ needs.build-api.outputs.tag }}
          argocd app sync prod-api --timeout 600

      - name: Wait for canary rollout to complete
        run: |
          kubectl argo rollouts status anime-rag-api \
            -n anime-rag-prod \
            --timeout 15m

      - name: Sync prod-web
        run: |
          argocd app set prod-web \
            --helm-set image.repository=${{ needs.build-web.outputs.image }} \
            --helm-set image.tag=${{ needs.build-web.outputs.tag }}
          argocd app sync prod-web --timeout 300

      - name: Smoke test prod
        run: |
          PROD_URL=${{ secrets.PROD_API_URL }}
          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${PROD_URL}/health" || echo 000)
            [ "$STATUS" = "200" ] && echo "Prod healthy" && exit 0
            sleep 20
          done
          echo "Prod smoke test failed" && exit 1

      - name: Notify on failure (rollback)
        if: failure()
        run: |
          # Abort in-progress rollout and roll back
          kubectl argo rollouts abort anime-rag-api -n anime-rag-prod || true
          kubectl argo rollouts undo anime-rag-api -n anime-rag-prod || true
          echo "::error::Prod deploy failed — rollout aborted and rolled back"
