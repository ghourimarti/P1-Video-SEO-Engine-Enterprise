services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anime_rag}
      POSTGRES_USER: ${POSTGRES_USER:-anime_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anime_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: bitnami/pgbouncer:1.22.1
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-anime_rag}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-anime_rag}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "200"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_SIZE: "5"
    ports:
      - "5433:5432"   # expose on 5433 so direct postgres is still reachable on 5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-anime_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - pgbouncer

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
      # Switch to "production" for a hardened, non-root image:
      #   DOCKER_TARGET=production docker compose up --build api
      target: ${DOCKER_TARGET:-development}
    env_file: .env
    environment:
      # Point API at PgBouncer when pgbouncer profile is active;
      # fall back to direct postgres otherwise.
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Source mounted only in development target; no-op in production
      - ./apps/api/src:/app/src:ro
      - ./packages:/packages:ro
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    # Read-only root fs in production; tmp dirs whitelisted
    # Uncomment when using production target:
    # read_only: true
    # tmpfs:
    #   - /tmp
    #   - /app/__pycache__

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-production}
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_API_URL: http://api:8000
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    profiles:
      # Run with: docker compose --profile web up
      # Avoids needing Clerk keys for pure-API development
      - web

  langfuse-server:
    image: langfuse/langfuse:2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-anime_rag}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-anime_rag}
      NEXTAUTH_SECRET: dev_nextauth_secret_change_in_prod
      SALT: dev_salt_change_in_prod
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    profiles:
      - observability

volumes:
  pgdata:
  redisdata:
