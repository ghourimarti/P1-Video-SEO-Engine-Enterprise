replicaCount: 1

image:
  repository: ""    # CI fills: <account>.dkr.ecr.us-east-1.amazonaws.com/anime-rag/dev/api

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

pdb:
  enabled: false

ingress:
  hosts:
    - host: api.dev.anime-rag.example.com
      paths:
        - path: /
          pathType: Prefix

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""   # CI fills from terraform output: iam.api_role_arn

externalSecret:
  remoteRef:
    key: anime-rag/dev/api/secrets

env:
  LOG_LEVEL: "DEBUG"
  WORKERS: "1"

rollout:
  enabled: false    # use plain Deployment in dev for fast iteration

nodeSelector: {}    # dev nodes have no purpose label
