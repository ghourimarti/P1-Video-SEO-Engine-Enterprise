{{- if .Values.externalSecret.enabled }}
# ESO ExternalSecret — syncs AWS Secrets Manager → Kubernetes Secret.
# Requires External Secrets Operator + ClusterSecretStore "aws-secretsmanager".
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "anime-rag-api.fullname" . }}-secrets
  labels:
    {{- include "anime-rag-api.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ include "anime-rag-api.fullname" . }}-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.remoteRef.key }}
{{- end }}
