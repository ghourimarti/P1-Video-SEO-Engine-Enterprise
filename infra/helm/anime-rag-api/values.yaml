replicaCount: 2

image:
  repository: ""          # filled by CI: <account>.dkr.ecr.<region>.amazonaws.com/anime-rag-api
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}         # IRSA role ARN injected per env via values-<env>.yaml
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  hosts:
    - host: api.anime-rag.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 20
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

nodeSelector:
  node.kubernetes.io/purpose: system

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: anime-rag-api
          topologyKey: kubernetes.io/hostname

# ExternalSecret — pulls from AWS Secrets Manager via ESO
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreName: aws-secretsmanager
  remoteRef:
    key: ""    # e.g. anime-rag/dev/api/secrets — set per env

# Environment variables that are NOT secret
env:
  LOG_LEVEL: "INFO"
  WORKERS: "2"

# Rollout strategy (Argo Rollouts)
rollout:
  enabled: true
  canary:
    steps:
      - setWeight: 20
      - pause: {duration: 2m}
      - analysis:
          templates:
            - templateName: api-success-rate
      - setWeight: 50
      - pause: {duration: 2m}
      - analysis:
          templates:
            - templateName: api-success-rate
      - setWeight: 100
    analysis:
      successfulRunHistoryLimit: 3
      unsuccessfulRunHistoryLimit: 3
