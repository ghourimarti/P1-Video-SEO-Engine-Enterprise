replicaCount: 2

image:
  repository: ""    # CI fills

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 12

pdb:
  enabled: true
  minAvailable: 1

ingress:
  annotations:
    alb.ingress.kubernetes.io/certificate-arn: ""   # ACM cert ARN
  hosts:
    - host: anime-rag.example.com
      paths:
        - path: /
          pathType: Prefix

env:
  NEXT_PUBLIC_API_URL: "https://api.anime-rag.example.com"
  NODE_ENV: "production"

nodeSelector:
  node.kubernetes.io/purpose: system
