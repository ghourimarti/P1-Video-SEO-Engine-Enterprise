[databases]
; Route all anime_rag connections through PgBouncer to the RDS/Postgres backend.
; In prod, replace host/port with the RDS endpoint injected via ESO secret.
anime_rag = host=postgres port=5432 dbname=anime_rag

[pgbouncer]
; ── Listen ───────────────────────────────────────────────────────────────────
listen_addr   = 0.0.0.0
listen_port   = 5432
unix_socket_dir =

; ── Auth ──────────────────────────────────────────────────────────────────────
auth_type     = md5
auth_file     = /etc/pgbouncer/userlist.txt

; ── Pool mode ─────────────────────────────────────────────────────────────────
; transaction — one server connection per transaction, not per client connection.
; Correct for async FastAPI usage (psycopg3 AsyncConnectionPool).
pool_mode     = transaction

; ── Pool sizing ───────────────────────────────────────────────────────────────
; max_client_conn: FastAPI workers × expected concurrent connections per worker
max_client_conn    = 200
; default_pool_size: actual Postgres server connections.
; RDS db.t3.medium max_connections ≈ 170; leave headroom for migrations/admin.
default_pool_size  = 20
min_pool_size      = 5
reserve_pool_size  = 5
reserve_pool_timeout = 3

; ── Timeouts ──────────────────────────────────────────────────────────────────
server_connect_timeout  = 15
server_idle_timeout     = 600
server_lifetime         = 3600
client_idle_timeout     = 0
query_timeout           = 0
query_wait_timeout      = 30

; ── Logging ───────────────────────────────────────────────────────────────────
log_connections   = 0   ; set to 1 for debug, noisy in prod
log_disconnections = 0
log_pooler_errors  = 1
stats_period       = 60

; ── Admin ─────────────────────────────────────────────────────────────────────
admin_users   = pgbouncer_admin
stats_users   = pgbouncer_stats

; ── TLS (prod: point to RDS CA bundle) ───────────────────────────────────────
;server_tls_sslmode    = require
;server_tls_ca_file    = /etc/ssl/rds-ca.pem
