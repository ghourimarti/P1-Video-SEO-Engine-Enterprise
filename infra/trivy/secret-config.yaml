# Trivy secrets scanning config
# Suppress known safe patterns that trigger false positives
rules:
  - id: generic-api-key
    severity: CRITICAL
    title: Generic API Key

  - id: aws-access-key-id
    severity: CRITICAL
    title: AWS Access Key

  - id: github-pat
    severity: HIGH
    title: GitHub Personal Access Token

# Paths to skip (test fixtures, example files)
allow-rules:
  - id: allow-env-example
    paths:
      - .env.example
    reason: "Example env file — contains placeholder values, not real secrets"
